<!-- Premium Dark Glassmorphism Navbar -->
<header
  class="fixed top-0 left-0 w-full z-50 transition-all duration-300 bg-[#0a0a0f]/80 backdrop-blur-xl border-b border-white/10 shadow-[0_4px_30px_rgba(0,0,0,0.1)]">
  <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

    <!-- Brand -->
    <a routerLink="/" class="flex items-center gap-3 group">
      <img src="assets/logo.png" alt="Sahyog Logo"
        class="w-12 h-12 rounded-full object-contain p-1 bg-[#1e0a17] shadow-[0_0_15px_rgba(236,72,153,0.3)] border border-[#ec4899]/30 group-hover:shadow-[0_0_20px_rgba(247,140,174,0.4)] transition-all duration-300">
      <div class="flex flex-col">
        <span
          class="text-xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-300 tracking-wide group-hover:from-[#f78cae] group-hover:to-white transition-all duration-300">Sahyog</span>
        <span
          class="text-[0.6rem] font-medium text-[#f78cae] uppercase tracking-widest leading-none mt-0.5 ml-0.5">सहयोग</span>
      </div>
    </a>

    <!-- Nav Links -->
    <div class="flex items-center gap-4">

      <!-- Member links -->
      @if (authService.isMember()) {
      <nav
        class="hidden md:flex items-center gap-1 mr-4 bg-white/5 border border-white/10 rounded-full px-2 py-1 backdrop-blur-md">
        <a routerLink="/dashboard"
          class="text-sm text-gray-300 hover:text-white font-medium transition-colors px-4 py-2 rounded-full hover:bg-white/10">
          Dashboard
        </a>
        <a routerLink="/pay-contribution"
          class="text-sm text-gray-300 hover:text-white font-medium transition-colors px-4 py-2 rounded-full hover:bg-white/10">
          Contribute
        </a>
        <a routerLink="/submit-claim"
          class="text-sm text-gray-300 hover:text-white font-medium transition-colors px-4 py-2 rounded-full hover:bg-white/10">
          Claim
        </a>
      </nav>

      <button (click)="logout()"
        class="text-sm bg-white/10 border border-white/20 text-white px-5 py-2.5 rounded-xl hover:bg-red-500/20 hover:border-red-500/50 hover:text-red-400 transition-all font-semibold shadow-lg backdrop-blur-md">
        Logout
      </button>
      }

      <!-- Claim Officer links -->
      @else if (authService.isClaimOfficer()) {
      <a routerLink="/claim-officer/dashboard"
        class="text-sm text-gray-300 hover:text-white font-medium transition-colors px-4 py-2 rounded-full hover:bg-white/10 mr-2">
        Review Queue
      </a>
      <span
        class="text-xs bg-amber-500/20 border border-amber-500/30 text-amber-400 px-3 py-1.5 rounded-full font-bold tracking-wide shadow-[0_0_10px_rgba(245,158,11,0.2)]">
        Claim Officer
      </span>
      <button (click)="logout()"
        class="text-sm bg-white/10 border border-white/20 text-white px-5 py-2.5 rounded-xl hover:bg-white/20 transition-all font-semibold ml-3 backdrop-blur-md">
        Logout
      </button>
      }

      <!-- Admin links -->
      @else if (authService.isAdmin()) {
      <span
        class="text-xs bg-purple-500/20 border border-purple-500/30 text-purple-400 px-3 py-1.5 rounded-full font-bold tracking-wide shadow-[0_0_10px_rgba(168,85,247,0.2)]">
        Admin
      </span>
      <button (click)="logout()"
        class="text-sm bg-white/10 border border-white/20 text-white px-5 py-2.5 rounded-xl hover:bg-white/20 transition-all font-semibold ml-3 backdrop-blur-md">
        Logout
      </button>
      }

      <!-- Logged out -->
      @else {
      <a routerLink="/login"
        class="text-sm text-gray-300 hover:text-white font-bold transition-colors px-5 py-2.5 rounded-xl hover:bg-white/10">
        Sign In
      </a>
      <a routerLink="/register"
        class="text-sm bg-gradient-to-r from-[#853953] to-[#4a1c2d] text-white px-6 py-2.5 rounded-xl hover:from-[#a04866] hover:to-[#612D53] transition-all font-bold shadow-[0_0_15px_rgba(133,57,83,0.3)] hover:shadow-[0_0_25px_rgba(133,57,83,0.5)] border border-white/10">
        Join Community
      </a>
      }

    </div>
  </div>
</header>
