<div
  class="min-h-screen flex bg-[#020617] text-[#cbd5f5] font-sans relative overflow-hidden selection:bg-[#ec4899]/30 selection:text-white">

  <!-- Glowing effects -->
  <div
    class="absolute top-0 right-1/4 w-[600px] h-[600px] bg-[#ec4899]/10 blur-[150px] rounded-full pointer-events-none z-0 fixed">
  </div>
  <div
    class="absolute bottom-0 left-0 w-[500px] h-[500px] bg-[#1e1b4b]/50 blur-[150px] rounded-full pointer-events-none z-0 fixed">
  </div>

  <!-- ── Sidebar ─────────────────────────────────────────── -->
  <aside class="w-64 bg-white/5 border-r border-white/10 text-white flex flex-col backdrop-blur-xl fixed h-full z-10">

    <!-- Brand -->
    <div class="px-6 py-7 border-b border-white/10">
      <div class="flex items-center gap-3">
        <img src="assets/logo.png" alt="Sahyog Logo"
          class="w-12 h-12 rounded-full object-contain p-1 bg-[#1e0a17] shadow-[0_0_15px_rgba(236,72,153,0.3)] border border-[#ec4899]/30">
        <div>
          <h1 class="text-base font-bold">Sahyog Admin</h1>
          <p class="text-xs text-white/50 uppercase tracking-widest">Control Panel</p>
        </div>
      </div>
    </div>

    <!-- Nav -->
    <nav class="flex-1 px-3 py-5 space-y-1 overflow-y-auto">

      <a routerLink="/admin/dashboard" routerLinkActive="bg-white/20 text-white"
        class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-white/70 hover:bg-white/10 hover:text-white transition-all font-medium text-sm">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        Overview
      </a>

      <a routerLink="/admin/regions" routerLinkActive="bg-white/20 text-white"
        class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-white/70 hover:bg-white/10 hover:text-white transition-all font-medium text-sm">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17.657 16.657L13.414 20.9a2 2 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
        Regions
      </a>

      <a routerLink="/admin/members" routerLinkActive="bg-white/20 text-white"
        class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-white/70 hover:bg-white/10 hover:text-white transition-all font-medium text-sm">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
        Members
      </a>

      <a routerLink="/admin/disasters" routerLinkActive="bg-white/20 text-white"
        class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-white/70 hover:bg-white/10 hover:text-white transition-all font-medium text-sm">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
        Disasters
      </a>

      <a routerLink="/admin/claims" routerLinkActive="bg-white/20 text-white"
        class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-white/70 hover:bg-white/10 hover:text-white transition-all font-medium text-sm">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414A1 1 0 0119 9.414V19a2 2 0 01-2 2z" />
        </svg>
        Claims
      </a>

      <a routerLink="/admin/policies" routerLinkActive="bg-white/20 text-white"
        class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-white/70 hover:bg-white/10 hover:text-white transition-all font-medium text-sm">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
        </svg>
        Policies
      </a>

      <div class="border-t border-white/10 my-3"></div>

      <a routerLink="/admin/claim-officers" routerLinkActive="bg-white/20 text-white"
        class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-white/70 hover:bg-white/10 hover:text-white transition-all font-medium text-sm">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
        Claim Officers
      </a>

    </nav>

    <!-- Logout -->
    <div class="px-3 py-4 border-t border-white/10">
      <button (click)="auth.logout()"
        class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-white/60 hover:bg-white/10 hover:text-white transition-all text-sm font-medium">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
        Logout
      </button>
    </div>
  </aside>

  <!-- ── Page Content ──────────────────────────────────────── -->
  <main class="flex-1 ml-64 min-h-screen relative z-10 w-[calc(100%-16rem)] overflow-y-auto">
    <router-outlet />
  </main>
</div>
